name: Go

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24'
        cache: true

    - name: Build
      working-directory: fugu
      run: |
        ls
        cd fugu
        ls
        go mod tidy
        go generate ./pkg/parser/action
        go build -v ./...

    - name: Test
      run: |
        cd fugu
        go test -v -race ./...
