name: Go

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
    
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-go@v5
      with:
        go-version: '1.25.6'
        cache: true
        cache-dependency-path: fugu/go.sum

    - name: Build
      working-directory: fugu
      run: |
        go mod download
        go build -v ./...

    - name: Test
      working-directory: fugu
      run: go test -v -race ./...
